<style>

/* ── Filter bar ── */
.filter-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 35px;
}
.filter-btn {
    padding: 9px 20px;
    border-radius: 20px;
    border: 1px solid #1f2f55;
    background: #111c33;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.2s;
}
.filter-btn:hover,
.filter-btn.active {
    background: #2563eb;
    border-color: #2563eb;
    color: #fff;
}

/* ── Product grid ── */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
}

/* ── Product card – mirrors .service-card exactly ── */
.product-card {
    background: #111c33;
    border: 1px solid #1f2f55;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
}
.product-card:hover {
    transform: translateY(-8px);
    border-color: #3b82f6;
}
.product-image {
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
}
.product-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
}
.product-tag {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #60a5fa;
    margin-bottom: 6px;
}
.product-card h3 {
    color: #60a5fa;
    margin-bottom: 10px;
}
.product-card p {
    font-size: 0.9rem;
    color: #9ca3af;
    flex: 1;
    margin-bottom: 14px;
}
.product-price {
    font-size: 1.5rem;
    color: #e5e7eb;
    margin: 10px 0;
}
.add-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 22px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
    transition: 0.2s;
}
.add-btn:hover {
    background: #1d4ed8;
    transform: scale(1.05);
}
.add-btn.added {
    background: #16a34a;
}

@media(max-width: 768px) {
    .product-grid { grid-template-columns: 1fr 1fr; }
}
@media(max-width: 480px) {
    .product-grid { grid-template-columns: 1fr; }
}
</style>
</head>

];

function renderProducts(filter) {
    const list = filter === "all" ? products : products.filter(p => p.category === filter);
    document.getElementById("productGrid").innerHTML = list.map(p => `
        <div class="product-card">
            <div class="product-image"><img src="${p.image}" alt="${p.name}" loading="lazy"></div>
            <div class="product-tag">${p.tag}</div>
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <div class="product-price">$${p.price.toFixed(2)}</div>
            <a href="${p.url}" target="_blank" class="add-btn">View Product</a>
        </div>
    `).join("");
}

function filterProducts(cat, btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderProducts(cat);
}

function toggleMenu() {
    document.querySelector("nav ul").classList.toggle("open");
}

renderProducts("all");
</script>
