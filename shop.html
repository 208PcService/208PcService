<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>208PcService – Shop</title>
<link rel="stylesheet" href="css/style.css">
<style>

/* ── Filter bar ── */
.filter-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 35px;
}
.filter-btn {
    padding: 9px 20px;
    border-radius: 20px;
    border: 1px solid #1f2f55;
    background: #111c33;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.2s;
}
.filter-btn:hover,
.filter-btn.active {
    background: #2563eb;
    border-color: #2563eb;
    color: #fff;
}

/* ── Product grid ── */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
}

/* ── Product card – mirrors .service-card exactly ── */
.product-card {
    background: #111c33;
    border: 1px solid #1f2f55;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
}
.product-card:hover {
    transform: translateY(-8px);
    border-color: #3b82f6;
}
.product-icon {
    font-size: 4.5rem;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
}
.product-tag {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #60a5fa;
    margin-bottom: 6px;
}
.product-card h3 {
    color: #60a5fa;
    margin-bottom: 10px;
}
.product-card p {
    font-size: 0.9rem;
    color: #9ca3af;
    flex: 1;
    margin-bottom: 14px;
}
.product-price {
    font-size: 1.5rem;
    color: #e5e7eb;
    margin: 10px 0;
}
.add-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 22px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
    transition: 0.2s;
}
.add-btn:hover {
    background: #1d4ed8;
    transform: scale(1.05);
}
.add-btn.added {
    background: #16a34a;
}

/* ── Sticky cart bar ── */
.cart-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #050814;
    border-top: 1px solid #1f3b82;
    padding: 14px 24px;
    z-index: 500;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}
.cart-bar.visible { display: flex; }
.cart-bar-left {
    display: flex;
    align-items: center;
    gap: 12px;
}
.cart-count {
    background: #2563eb;
    color: #fff;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.85rem;
    font-weight: 700;
}
.cart-total-label {
    color: #e5e7eb;
    font-size: 1rem;
    font-weight: 600;
}
.cart-bar-right { display: flex; gap: 10px; }
.view-cart-btn {
    padding: 10px 20px;
    background: #111c33;
    color: #60a5fa;
    border: 1px solid #1f3b82;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
    transition: 0.2s;
}
.view-cart-btn:hover { border-color: #3b82f6; color: #93c5fd; }
.checkout-bar-btn {
    padding: 10px 20px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
    transition: 0.2s;
}
.checkout-bar-btn:hover { background: #1d4ed8; }

/* ── Cart modal ── */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 2000;
    align-items: center;
    justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #0d1626;
    border: 1px solid #1f3b82;
    border-radius: 15px;
    width: min(520px, 95vw);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid #1f3b82;
}
.modal-header h2 { font-size: 1.2rem; color: #e5e7eb; }
.close-modal {
    background: none;
    border: none;
    color: #9ca3af;
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
}
.close-modal:hover { color: #e5e7eb; }
.modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
}
.cart-empty-msg {
    text-align: center;
    padding: 50px 0;
    color: #6b7280;
}
.cart-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid #1f2f55;
}
.cart-item-icon { font-size: 2rem; width: 44px; text-align: center; }
.cart-item-info { flex: 1; }
.cart-item-info h4 { font-size: 0.95rem; color: #e5e7eb; margin-bottom: 3px; }
.cart-item-info p  { font-size: 0.8rem; color: #9ca3af; }
.cart-item-price   { font-weight: 700; color: #e5e7eb; white-space: nowrap; }
.remove-item {
    background: none;
    border: none;
    color: #ef4444;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px 6px;
}
.remove-item:hover { color: #fca5a5; }
.modal-footer {
    padding: 18px 24px;
    border-top: 1px solid #1f3b82;
}
.modal-total {
    display: flex;
    justify-content: space-between;
    font-size: 1.1rem;
    font-weight: 700;
    color: #e5e7eb;
    margin-bottom: 16px;
}
.modal-checkout-btn {
    width: 100%;
    padding: 14px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
    transition: 0.2s;
}
.modal-checkout-btn:hover { background: #1d4ed8; }

/* ── Toast ── */
.toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #16a34a;
    color: #fff;
    padding: 11px 22px;
    border-radius: 8px;
    font-size: 0.9rem;
    z-index: 3000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* extra bottom padding so cart bar doesn't cover last row */
.section { padding-bottom: 100px; }

@media(max-width: 768px) {
    .product-grid { grid-template-columns: 1fr 1fr; }
}
@media(max-width: 480px) {
    .product-grid { grid-template-columns: 1fr; }
    .cart-bar { flex-direction: column; align-items: flex-start; }
    .cart-bar-right { width: 100%; }
    .checkout-bar-btn, .view-cart-btn { flex: 1; text-align: center; }
}
</style>
</head>

<body>

<!-- NAV -->
<header>
<nav>
<div class="logo">
    <a href="index.html">
        <img src="Images/logo.png" alt="208PcService Logo">
    </a>
</div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="about.html">About</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="book.html">Book Appointment</a></li>
</ul>
<button class="hamburger" onclick="toggleMenu()">&#9776;</button>
</nav>
</header>

<!-- PAGE HEADER -->
<div class="page-header">
    <h1>Shop</h1>
    <br>
    <h4>Quality PC parts and accessories — ready to order and install.</h4>
</div>

<!-- SHOP SECTION -->
<section class="section">

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
        <button class="filter-btn" onclick="filterProducts('storage', this)">Storage</button>
        <button class="filter-btn" onclick="filterProducts('memory', this)">Memory</button>
        <button class="filter-btn" onclick="filterProducts('cooling', this)">Cooling</button>
        <button class="filter-btn" onclick="filterProducts('accessories', this)">Accessories</button>
    </div>

    <div class="product-grid" id="productGrid"></div>

</section>

<!-- STICKY CART BAR -->
<div class="cart-bar" id="cartBar">
    <div class="cart-bar-left">
        <span class="cart-count" id="cartCount">0 items</span>
        <span class="cart-total-label" id="cartTotalLabel">$0.00</span>
    </div>
    <div class="cart-bar-right">
        <button class="view-cart-btn" onclick="openModal()">View Cart</button>
        <button class="checkout-bar-btn" onclick="checkout()">Contact Us to Order</button>
    </div>
</div>

<!-- CART MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
        <div class="modal-header">
            <h2>Your Cart</h2>
            <button class="close-modal" onclick="closeModal()">&#10005;</button>
        </div>
        <div class="modal-body" id="modalBody">
            <p class="cart-empty-msg">Your cart is empty.</p>
        </div>
        <div class="modal-footer">
            <div class="modal-total">
                <span>Total</span>
                <span id="modalTotal">$0.00</span>
            </div>
            <button class="modal-checkout-btn" onclick="checkout()">Contact Us to Order</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FOOTER -->
<footer>
<p>&copy; 2026 208PcService. All Rights Reserved.</p>
<p><a href="privacy.html">Privacy Policy</a></p>
<p><a href="terms.html">Terms of Service</a></p>
</footer>

<script>
const products = [
    { id:1,  name:"500GB SSD (SATA)",        category:"storage",     price:49.99,  icon:"&#128190;", tag:"Storage",     desc:"Reliable SATA SSD — a great upgrade from a spinning hard drive." },
    { id:2,  name:"1TB SSD (SATA)",           category:"storage",     price:79.99,  icon:"&#128190;", tag:"Storage",     desc:"1TB of fast SATA storage, perfect for your OS and games combined." },
    { id:3,  name:"500GB NVMe M.2 SSD",       category:"storage",     price:64.99,  icon:"&#9889;",   tag:"Storage",     desc:"Blazing-fast NVMe speeds for a much snappier everyday experience." },
    { id:4,  name:"1TB NVMe M.2 SSD",         category:"storage",     price:99.99,  icon:"&#9889;",   tag:"Storage",     desc:"High-capacity NVMe for heavy workloads, video editing, and gaming." },
    { id:5,  name:"8GB DDR4 RAM",             category:"memory",      price:24.99,  icon:"&#129513;", tag:"Memory",      desc:"Single 8GB DDR4 stick — compatible with most desktops and laptops." },
    { id:6,  name:"16GB DDR4 RAM Kit (2x8)",  category:"memory",      price:44.99,  icon:"&#129513;", tag:"Memory",      desc:"Dual-channel kit for noticeably snappier multitasking performance." },
    { id:7,  name:"32GB DDR4 RAM Kit (2x16)", category:"memory",      price:79.99,  icon:"&#129513;", tag:"Memory",      desc:"Ideal for streaming, editing, or running very demanding workloads." },
    { id:8,  name:"120mm Case Fan",           category:"cooling",     price:12.99,  icon:"&#127744;", tag:"Cooling",     desc:"Quiet 120mm fan to improve airflow and keep your temps in check." },
    { id:9,  name:"CPU Thermal Paste",        category:"cooling",     price:8.99,   icon:"&#129514;", tag:"Cooling",     desc:"High-quality thermal compound for better CPU heat transfer." },
    { id:10, name:"Aftermarket CPU Cooler",   category:"cooling",     price:29.99,  icon:"&#10052;",  tag:"Cooling",     desc:"Outperforms most stock coolers — quieter and runs much cooler." },
    { id:11, name:"SATA Data Cables (x2)",    category:"accessories", price:7.99,   icon:"&#128268;", tag:"Accessories", desc:"Two SATA III data cables for connecting drives inside your case." },
    { id:12, name:"Anti-Static Wrist Strap",  category:"accessories", price:6.99,   icon:"&#128737;", tag:"Accessories", desc:"Protect your components from static discharge during any install." },
    { id:13, name:"PC Cleaning Kit",          category:"accessories", price:14.99,  icon:"&#129529;", tag:"Accessories", desc:"Compressed air, brush, and microfibre cloth for a thorough clean." },
    { id:14, name:"USB-C to USB-A Adapter",   category:"accessories", price:9.99,   icon:"&#128268;", tag:"Accessories", desc:"Simple adapter for connecting USB-C devices to older USB-A ports." },
];

let cart = [];

function renderProducts(filter) {
    const list = filter === "all" ? products : products.filter(p => p.category === filter);
    document.getElementById("productGrid").innerHTML = list.map(p => `
        <div class="product-card">
            <div class="product-icon">${p.icon}</div>
            <div class="product-tag">${p.tag}</div>
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <div class="product-price">$${p.price.toFixed(2)}</div>
            <button class="add-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
    `).join("");
}

function filterProducts(cat, btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderProducts(cat);
}

function addToCart(id) {
    const product = products.find(p => p.id === id);
    const existing = cart.find(i => i.id === id);
    if (existing) { existing.qty++; } else { cart.push({ ...product, qty: 1 }); }
    updateCartUI();
    showToast(product.name + " added to cart");
    const btn = document.getElementById("btn-" + id);
    if (btn) {
        btn.textContent = "Added!";
        btn.classList.add("added");
        setTimeout(() => { btn.textContent = "Add to Cart"; btn.classList.remove("added"); }, 1500);
    }
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
}

function updateCartUI() {
    const totalQty   = cart.reduce((s, i) => s + i.qty, 0);
    const totalPrice = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const priceStr   = "$" + totalPrice.toFixed(2);

    const bar = document.getElementById("cartBar");
    totalQty > 0 ? bar.classList.add("visible") : bar.classList.remove("visible");

    document.getElementById("cartCount").textContent      = totalQty + (totalQty === 1 ? " item" : " items");
    document.getElementById("cartTotalLabel").textContent = priceStr;
    document.getElementById("modalTotal").textContent     = priceStr;

    const body = document.getElementById("modalBody");
    if (cart.length === 0) {
        body.innerHTML = '<p class="cart-empty-msg">Your cart is empty.</p>';
        return;
    }
    body.innerHTML = cart.map(i => `
        <div class="cart-item">
            <div class="cart-item-icon">${i.icon}</div>
            <div class="cart-item-info">
                <h4>${i.name}</h4>
                <p>Qty: ${i.qty}</p>
            </div>
            <span class="cart-item-price">$${(i.price * i.qty).toFixed(2)}</span>
            <button class="remove-item" onclick="removeFromCart(${i.id})" title="Remove">&#10005;</button>
        </div>
    `).join("");
}

function openModal()  { document.getElementById("modalOverlay").classList.add("open"); }
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }
function handleOverlayClick(e) { if (e.target === document.getElementById("modalOverlay")) closeModal(); }

function checkout() {
    if (cart.length === 0) { showToast("Your cart is empty!"); return; }
    const lines = cart.map(i => i.name + " x" + i.qty + " ($" + (i.price * i.qty).toFixed(2) + ")").join("%0A");
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
    window.location.href = "mailto:208pcservice@gmail.com?subject=Shop%20Order&body=Hi%2C%20I%27d%20like%20to%20order%3A%0A%0A" + lines + "%0A%0ATotal%3A%20%24" + total;
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}

function toggleMenu() {
    document.querySelector("nav ul").classList.toggle("open");
}

renderProducts("all");
</script>
</body>
</html>
